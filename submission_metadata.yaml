# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging.
  Used GitHub Copilot for autocomplete. No candidate data was fed to
  any external LLM during the ranking step. LLM calls (Groq/Llama-3.1)
  are only used in offline pre-generation of reasoning strings, which
  are cached as data/reasoning_cache.json before submission.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Four-component offline ranker with zero network calls at runtime.
  Semantic similarity (55%) via sentence-transformers/all-MiniLM-L6-v2
  cosine embeddings precomputed for 100K candidates. India platform
  signals (20%) score activity recency, city tier, profile completeness,
  and India-specific tech. Career trajectory (10%) measures skill
  velocity, title progression speed, and advanced recency. Behavioral
  signals (15%) weight open_to_work, recruiter response rate, and
  GitHub activity. Honeypot detection via proficiency-duration
  inconsistency catches ~605 impossible profiles. Disqualifier
  penalties for consulting-only careers, title-chasers, and
  offer-ghosting. Runtime: 6 seconds for 100K candidates on CPU.

