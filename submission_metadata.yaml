ai_usage_summary: |
  Used Claude (Anthropic) for architecture discussion, prompt engineering
  for the LLM explainer stage, and code review. Used Gemini via the
  Antigravity IDE for iterative code generation and debugging across all
  pipeline stages. No candidate data from the official dataset was fed to
  any external LLM. All ranking logic, scoring weights, and signal design
  are original work.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  TalentLens Bharat is a 4-component blended scoring pipeline designed for
  the Indian talent market. The final score is:
  0.55 * semantic_score * seniority_penalty
  + 0.20 * india_signal_score
  + 0.10 * trajectory_score
  + 0.15 * behavioral_signal_score

  Semantic score uses all-MiniLM-L6-v2 embeddings with a seniority gap
  multiplier (1.00 to 0.75) to prevent junior keyword-stuffers outranking
  senior candidates. India signals reward Tier-2/3 city candidates (+0.15),
  India-specific tech stacks (UPI, Aadhaar, Tally, +0.10 each), and recent
  platform activity. Trajectory scoring measures career momentum via skill
  velocity and title progression speed. Behavioral signals use redrob_signals
  fields: open_to_work_flag, recruiter_response_rate, github_activity_score.
  Disqualifier penalties (job hopping, consulting-only careers, offer
  ghosting) multiply the blended score down. Honeypot detection caps
  impossible profiles at 0.05. Embeddings are precomputed offline;
  ranking runs in under 7 seconds with zero network calls.

